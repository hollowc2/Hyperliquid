networks:
  hl-net:
    driver: bridge
  monitoring_net:
    external: true
    name: monitoring_net

services:

  # ── Orchestrator ────────────────────────────────────────────────────
  # Central hub: market data feed (ZMQ PUB 5555), fill dispatcher
  # (ZMQ PUB 5556), REST API (8000), risk manager, and Docker lifecycle.
  #
  # Required in .env:
  #   HL_WALLET_ADDRESS, HL_PRIVATE_KEY
  #   GLOBAL_NOTIONAL_CEILING_USD=50000
  #   GLOBAL_MAX_OPS=10
  #   STRATEGIES_DIR=/app/strategies
  #   DB_PATH=/app/data/orchestrator.db
  orchestrator:
    build:
      context: .
      target: runtime
    image: hl-engine:latest
    command: python -m hl_engine.orchestrator.main
    env_file: .env
    ports:
      - "127.0.0.1:8100:8000"    # REST API (host 8100, 8000 is taken by butterfly)
      - "5555:5555"               # ZMQ market data PUB
      - "5556:5556"               # ZMQ fills PUB
    volumes:
      - ./data:/app/data                       # SQLite DB + catalog
      - ./strategies:/app/strategies           # YAML strategy configs
      - /var/run/docker.sock:/var/run/docker.sock  # Docker lifecycle mgmt
    networks:
      - hl-net
      - monitoring_net
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ── TimescaleDB live recorder ───────────────────────────────────────
  # Subscribes to orchestrator ZMQ PUB (5555) and writes to TimescaleDB.
  # Uses host networking so the container can reach both:
  #   - orchestrator ZMQ on 127.0.0.1:5555 (port-mapped to host)
  #   - TimescaleDB on 127.0.0.1:5432
  #
  # Requires in .env:
  #   TS_DSN=postgresql://hl_user:secret@localhost:5432/market_data
  #   HL_RECORD_COINS=BTC,ETH,SOL
  #
  # Build: docker compose build ts-recorder
  # Run:   docker compose up -d ts-recorder
  ts-recorder:
    build:
      context: .
      target: collector
    image: apex-collector:latest
    command: python record_live_ts.py
    env_file: .env
    environment:
      ZMQ_ENDPOINT: "tcp://127.0.0.1:5555"   # orchestrator port-mapped to host
    network_mode: host           # reaches butterfly_timescaledb on 127.0.0.1:5432
    depends_on:
      - orchestrator
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ── Live data recorder (Parquet catalog) ────────────────────────────
  # Subscribes to orchestrator ZMQ PUB (5555) and writes to Parquet
  # catalog at ./data/catalog for backtesting.
  recorder:
    build:
      context: .
      target: runtime
    image: hl-engine:latest
    command: python record_live_data.py
    env_file: .env                    # HL_RECORD_COINS, HL_CATALOG_PATH, etc.
    environment:
      ZMQ_ENDPOINT: "tcp://orchestrator:5555"
    volumes:
      - ./data:/app/data              # catalog persists on host
    networks:
      - hl-net                        # shares network with orchestrator for ZMQ
    depends_on:
      - orchestrator
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ── Historical catalog builder ──────────────────────────────────────
  # One-shot: fetch historical bars + funding and write to ./data/catalog.
  # Run with: docker compose run --rm build-catalog
  build-catalog:
    build:
      context: .
      target: runtime
    image: hl-engine:latest
    command: python build_historical_catalog.py
    env_file: .env
    volumes:
      - ./data:/app/data
    profiles:
      - tools                         # not started by default; use --profile tools

  # ── Live trader (APEX strategy) ─────────────────────────────────────
  # Paper trade: HL_PAPER_TRADE=true in .env (default)
  # Live trade:  set HL_PAPER_TRADE=false and add wallet credentials
  live-trader:
    build:
      context: .
      target: runtime
    image: hl-engine:latest
    command: python hl_engine/run_live.py
    env_file: .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ── Backtest ────────────────────────────────────────────────────────
  # Run with: docker compose run --rm backtest
  backtest:
    build:
      context: .
      target: runtime
    image: hl-engine:latest
    command: python hl_engine/run_backtest.py
    env_file: .env
    volumes:
      - ./data:/app/data
    profiles:
      - tools
