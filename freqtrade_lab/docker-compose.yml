services:
  freqtrade:
    image: freqtradeorg/freqtrade:stable
    restart: unless-stopped
    volumes:
      - ./user_data:/freqtrade/user_data
    env_file: .env
    environment:
      - FREQTRADE__api_server__enabled=true
      - FREQTRADE__api_server__listen_ip_address=0.0.0.0
      - FREQTRADE__api_server__listen_port=8080
      - FREQTRADE__api_server__verbosity=error
      - FREQTRADE__api_server__username=${FREQTRADE_API_USER}
      - FREQTRADE__api_server__password=${FREQTRADE_API_PASS}
      - FREQTRADE__api_server__jwt_secret_key=${FREQTRADE_JWT_SECRET}
    ports:
      - "127.0.0.1:8080:8080"
    command: >
      trade
      --logfile /freqtrade/user_data/logs/freqtrade.log
      --db-url sqlite:////freqtrade/user_data/tradesv3.sqlite
      --config /freqtrade/user_data/config/config.json
      --strategy StreakReversalStrategy
